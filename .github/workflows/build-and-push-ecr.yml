name: build-and-push-ecr

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  build-push:
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch' &&
          github.actor == 'Ahmedhessn'
        ) ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.actor.login == 'Ahmedhessn'
        )
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: nginx
            repository: k8s-self-managed-503459125797-dev-nginx
            context: .
            dockerfile: docker/nginx/Dockerfile
            trivy_exit_code: "1"
          - name: apps
            repository: k8s-self-managed-503459125797-dev-apps
            context: .
            dockerfile: Dockerfile
            trivy_exit_code: "1"
          - name: rabbitmq
            repository: k8s-self-managed-503459125797-dev-rabbitmq
            context: .
            dockerfile: docker/rabbitmq/Dockerfile
            trivy_exit_code: "1"
          - name: memcached
            repository: k8s-self-managed-503459125797-dev-memcached
            context: .
            dockerfile: docker/memcached/Dockerfile
            trivy_exit_code: "1"
          - name: mysql
            repository: k8s-self-managed-503459125797-dev-mysql
            context: .
            dockerfile: docker/db/Dockerfile
            # Vendor image may contain upstream CVEs; keep scanning but don't block pushes.
            trivy_exit_code: "0"
          # Your app image is Tomcat-based; publish same artifact to a "tomcat" repo too.
         
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (load for scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: local/${{ matrix.image.name }}:${{ github.sha }}

      - name: Trivy image scan (block on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/${{ matrix.image.name }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: ${{ matrix.image.trivy_exit_code }}
          version: v0.69.3
          trivyignores: .trivyignore

      - name: Push to ECR (with provenance + SBOM)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.image.repository }}:${{ github.sha }}-${{ github.run_attempt }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ matrix.image.repository }}@${{ steps.push.outputs.digest }}"
          cosign sign --yes "${IMAGE}"

      - name: Output image
        run: |
          echo "Pushed and signed:"
          echo "${{ steps.login-ecr.outputs.registry }}/${{ matrix.image.repository }}:${{ github.sha }}-${{ github.run_attempt }}"

